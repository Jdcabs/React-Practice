<!DOCTYPE html>
<html>
  <head>
    <title>ChatBot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    
    <script type="text/babel">

      function ChatMessage({message, sender}) {
        // console.log(props);
        // const message = props.message;
        // const sender = props.sender;
        
        // this is called destructuring assignment, it allows us to extract values from objects and arrays and assign them to variables in a more concise way.
        // const { message, sender } = props; 

        // if(sender === "robot") {
        //   return (
        //     <div>
        //       <img src="images/robot.png" width="50" />
        //       {message}
        //       {sender}
        //     </div>
        //   );
        // }

        return (
          <div>
            {sender === "robot" && <img src="images/robot.png" width="50" />}
            {message}
            {sender === "user" && <img src="images/user.png" width="50" />}
          </div>
        );
      }

      function ChatInput() {
        return (
          <>
            <input 
              placeholder="Type a message..." 
              size="30" 
            />
            <button>Send</button>
          </>
        );
      }

      function ChatMessages() {
        const chatMessages = [
            {
              message: 'Hello chatbot',
              sender: 'user',
              id: "id1"
            },
            {
              message: 'Hello! How can I help you?',
              sender: 'robot',
              id: "id2"
            },
            {
              message: 'Can you get me todays date?',
              sender: 'user',
              id: "id3"
            },
            {
              message: 'Today is September 27',
              sender: 'robot',
              id: "id4"
            }
          ];

        return (chatMessages.map((chatMessages) => {
            return (
              <ChatMessage
                message= {chatMessages.message}
                sender = {chatMessages.sender}
                key = {chatMessages.id}
              />
            );
          })
        );
      }

      function App() {
        return(
          <>
            <ChatInput/>
            <ChatMessages />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      
      ReactDOM.createRoot(container).render(<App />);

    </script>
  </body>
</html>
